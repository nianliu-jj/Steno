<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semo | Zen 写作模式</title>
  <link rel="stylesheet" href="../assets/semo.css">
</head>
<body data-screen="zen">
  <header class="site-header app-topbar">
    <a class="brand-lockup" href="../index.html" data-nav="home"><span class="brand-mark">Se</span><span>Semo</span></a>
    <nav class="site-nav" aria-label="原型屏幕">
      <a href="floating.html" data-nav="floating">浮窗速记</a>
      <a href="clipboard.html" data-nav="clipboard">剪贴板</a>
      <a href="canvas.html" data-nav="canvas">画布</a>
      <a href="zen.html" data-nav="zen">Zen</a>
      <a href="settings.html" data-nav="settings">设置</a>
    </nav>
  </header>

  <main class="zen-stage">
    <section class="zen-editor">
      <div class="screen-title">
        <div>
          <p class="eyebrow">ZEN MODE</p>
          <h2>把界面降到最低，只留下文字。</h2>
          <p>输入内容会实时统计字数，可保存为本地草稿。点击“隐藏干扰”会临时收起顶部和底部导航。</p>
        </div>
      </div>

      <section class="zen-card">
        <div class="zen-toolbar">
          <div class="row-actions" style="margin:0">
            <button class="button primary" data-action="zen-save" type="button">保存草稿</button>
            <button class="button" data-action="zen-clean" type="button">隐藏干扰</button>
          </div>
          <div class="note-meta">
            <span id="zen-count">0 字</span>
            <span id="zen-timer" class="mono">00:00</span>
            <span class="tag">本地草稿</span>
          </div>
        </div>
        <textarea id="zen-text" class="zen-textarea" aria-label="Zen 写作编辑器">今天的产品评审重点：

1. Semo 必须像一个安静的系统工具，而不是一个总想吸引注意力的笔记应用。
2. 浮窗应该快速出现，也应该快速离开。
3. 剪贴板、画布和写作模式都需要保持本地优先。</textarea>
      </section>
    </section>
  </main>

  <nav class="mobile-tabbar" aria-label="底部导航">
    <a href="floating.html" data-nav="floating">速记</a>
    <a href="clipboard.html" data-nav="clipboard">剪贴板</a>
    <a href="canvas.html" data-nav="canvas">画布</a>
    <a href="zen.html" data-nav="zen">Zen</a>
    <a href="settings.html" data-nav="settings">设置</a>
  </nav>
  <script src="../assets/semo.js"></script>
</body>
</html>
